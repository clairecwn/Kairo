<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ECE8DD">
    <title>Kairo</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128395;</text></svg>">
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./css/app.css">
  </head>
  <body>
    <main class="app-shell" aria-label="Kairo handwriting workspace">
      <header class="top-bar">
        <button class="tool-button standalone" data-action="home" title="My notes" aria-label="Back to my notes">
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3.5 9.5L10 3.5l6.5 6v6a1 1 0 01-1 1h-3.5v-4.5h-4V16.5H5a1 1 0 01-1-1v-6z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        </button>
        <button class="tool-button standalone" data-action="sidebar" title="Pages & folders" aria-label="Toggle pages and folders panel">
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M4 3h12a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1zm4.5 0v14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        </button>
        <input class="note-title" type="text" value="Untitled note" aria-label="Note title" maxlength="60">

        <div class="tool-groups">
          <div class="tool-group" role="toolbar" aria-label="Drawing tools">
            <button class="tool-button tool-pen" data-tool="pen" data-popover="pen-popover" title="Pen — tap again for colors & sizes">
              <svg viewBox="0 0 20 26" aria-hidden="true">
                <rect x="6.5" y="2" width="7" height="12" rx="2.4" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <path d="M7.5 14h5L10 21.5 7.5 14z" class="pen-tip" stroke="none"/>
                <rect x="6.5" y="11" width="7" height="3" rx="1" fill="currentColor" opacity="0.35" stroke="none"/>
              </svg>
            </button>
            <button class="tool-button tool-pen" data-tool="highlighter" title="Highlighter">
              <svg viewBox="0 0 20 26" aria-hidden="true">
                <rect x="5.5" y="2.5" width="9" height="11" rx="1.6" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <path d="M7 13.5h6l-1 6H8l-1-6z" class="pen-tip" opacity="0.55" stroke="none"/>
                <rect x="6.5" y="21" width="7" height="2.4" rx="1.2" class="pen-tip" opacity="0.9" stroke="none"/>
              </svg>
            </button>
            <button class="tool-button" data-tool="eraser" title="Eraser">
              <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M8 16l-4.5-4.5a1 1 0 010-1.4l6-6a1 1 0 011.4 0L16 9.2a1 1 0 010 1.4L10.6 16H8zm-1.5-8l5 5M8 16h8" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="tool-button" data-tool="text" data-popover="text-popover" title="Text box">
              <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M4 5h12M10 5v10m-2.5 0h5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
            <label class="tool-button" for="image-input" title="Insert image (question paper, screenshot — or just paste with Ctrl+V)">
              <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M4 14l3.5-4.5 2.5 3 2-2.5L16 14H4zm10-6a1.5 1.5 0 110-3 1.5 1.5 0 010 3zM3 3h14a1 1 0 011 1v12a1 1 0 01-1 1H3a1 1 0 01-1-1V4a1 1 0 011-1z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            </label>
            <input id="image-input" class="question-file-input" type="file" accept="image/*">
          </div>

          <div class="tool-group">
            <button class="tool-button" data-action="undo" title="Undo (Ctrl+Z)" aria-label="Undo">
              <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M7.5 5L4 8.5 7.5 12M4 8.5h8a4 4 0 010 8h-2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="tool-button" data-action="redo" title="Redo (Ctrl+Y)" aria-label="Redo">
              <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M12.5 5L16 8.5 12.5 12M16 8.5H8a4 4 0 000 8h2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>

          <div class="tool-group">
            <button class="tool-button" data-popover="page-popover" title="Page style" aria-label="Page style">
              <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M5 3h10a1 1 0 011 1v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4a1 1 0 011-1zm2 4h6M7 10h6M7 13h4" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </button>
            <button class="tool-button" data-action="help" title="Show walkthrough" aria-label="Show walkthrough">
              <svg viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="7.5" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M8 8a2 2 0 113.4 1.4c-.7.6-1.4 1-1.4 2" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="10" cy="14" r="0.9" fill="currentColor"/></svg>
            </button>
            <button class="tool-button" data-action="theme" title="Light / dark mode" aria-label="Toggle light or dark mode">
              <svg class="icon-sun" viewBox="0 0 20 20" aria-hidden="true"><circle cx="10" cy="10" r="3.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M10 2.5v2M10 15.5v2M2.5 10h2M15.5 10h2M4.7 4.7l1.4 1.4M13.9 13.9l1.4 1.4M15.3 4.7l-1.4 1.4M6.1 13.9l-1.4 1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
              <svg class="icon-moon" viewBox="0 0 20 20" aria-hidden="true"><path d="M16 12.5A6.5 6.5 0 017.5 4a6.5 6.5 0 108.5 8.5z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
      </header>

      <div class="popover" id="pen-popover" hidden>
        <div class="popover-row" data-pen-colors></div>
        <div class="popover-row" data-pen-sizes></div>
      </div>
      <div class="popover" id="text-popover" hidden>
        <div class="popover-row" data-text-fonts></div>
        <div class="popover-row" data-text-colors></div>
      </div>
      <div class="popover" id="page-popover" hidden>
        <div class="popover-label">Paper</div>
        <div class="popover-row" data-backgrounds></div>
        <div class="popover-label">Page size</div>
        <div class="popover-row" data-page-sizes></div>
        <div class="popover-label">History compaction</div>
        <div class="popover-row" data-compact-modes></div>
      </div>
      <div class="popover" id="color-popover" hidden>
        <div class="popover-row" data-label-colors></div>
      </div>

      <div class="workspace-row">
        <aside class="side-panel" hidden aria-label="Pages and files">
          <div class="side-section">
            <div class="side-heading">Pages
              <button type="button" class="side-add" data-side="add-page" title="New page" aria-label="New page">＋</button>
            </div>
            <div class="side-pages"></div>
          </div>
          <div class="side-section side-grow">
            <div class="side-heading">Files
              <button type="button" class="side-add" data-side="add-folder" title="New file" aria-label="New file">
                <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3 5.5A1.5 1.5 0 014.5 4h3l1.6 2H15.5A1.5 1.5 0 0117 7.5v7A1.5 1.5 0 0115.5 16h-11A1.5 1.5 0 013 14.5v-9zM10 9v4m-2-2h4" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>
              <button type="button" class="side-add" data-side="add-note" title="New notebook" aria-label="New notebook">＋</button>
            </div>
            <div class="side-tree" data-drop-root></div>
          </div>
        </aside>

        <section class="stage-wrap">
          <div class="stage-sizer">
            <section class="ink-stage" aria-label="Handwriting surface">
              <canvas id="committed-canvas" class="ink-canvas" aria-hidden="true"></canvas>
              <canvas id="wet-canvas" class="ink-canvas" aria-label="Write solution"></canvas>
            </section>
          </div>
        </section>

        <aside class="pin-rail" aria-label="Pinned references"></aside>
      </div>

      <div class="page-pager" role="navigation" aria-label="Pages and zoom">
        <button type="button" data-page="prev" title="Previous page" aria-label="Previous page">‹</button>
        <span class="page-pager-label">1 / 1</span>
        <button type="button" data-page="next" title="Next page" aria-label="Next page">›</button>
        <button type="button" data-page="add" title="New page" aria-label="New page">＋</button>
        <button type="button" data-page="delete" title="Delete this page" aria-label="Delete this page">
          <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M4 6h12M8 6V4.5A1.5 1.5 0 019.5 3h1A1.5 1.5 0 0112 4.5V6m2.5 0l-.7 9a1.5 1.5 0 01-1.5 1.4H7.7a1.5 1.5 0 01-1.5-1.4l-.7-9M8.2 9v5m3.6-5v5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span class="pager-divider"></span>
        <button type="button" data-zoom="out" title="Zoom out (Ctrl+scroll)" aria-label="Zoom out">−</button>
        <button type="button" class="zoom-label" data-zoom="reset" title="Reset zoom" aria-label="Reset zoom">100%</button>
        <button type="button" data-zoom="in" title="Zoom in (Ctrl+scroll)" aria-label="Zoom in">＋</button>
      </div>
    </main>

    <section class="home-screen" hidden>
      <div class="home-inner">
        <div class="home-hero">
          <div class="home-mark" aria-hidden="true">κ</div>
          <h1 class="home-title">Kairo</h1>
          <p class="home-subtitle">A notepad built for working through problems.</p>
          <button class="home-new" type="button">Get started</button>
        </div>
        <div class="home-grid-wrap">
          <div class="home-grid-heading">Your notebooks</div>
          <div class="home-grid" aria-label="Your notebooks"></div>
        </div>
      </div>
    </section>

    <script>
      // Set this to your deployed backend proxy URL (e.g. Render service URL) before deploying the frontend.
      // Leave empty to use http://127.0.0.1:8787 automatically when running on localhost.
      window.KAIRO_PROXY_URL = "";
    </script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
